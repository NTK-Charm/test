name: CI Baseline
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-check:
    name: Build and Sanity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Kiểm tra file Docker Compose
        run: docker compose config

      - name: Tạo file .env từ secrets
        run: |
          cat > .env <<'EOF'
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          WORDPRESS_DB_HOST=db:3306
          WORDPRESS_DB_USER=${{ secrets.MYSQL_USER }}
          WORDPRESS_DB_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          WORDPRESS_DB_NAME=${{ secrets.MYSQL_DATABASE }}
          WORDPRESS_TABLE_PREFIX=wp_
          WORDPRESS_DEBUG=false
          WORDPRESS_CONFIG_EXTRA=define('WP_DEBUG_LOG', false);
          ENVIRONMENT=ci
          DOMAIN=localhost
          EOF

      - name: Build thử Docker Images
        run: docker compose build

      - name: Start services for connectivity check
        run: |
          docker compose up -d
          docker compose ps

      - name: Wait for MariaDB readiness
        run: |
          for i in {1..30}; do
            docker compose exec -T db mysqladmin ping -u root -p"${{ secrets.MYSQL_ROOT_PASSWORD }}" --silent && break
            echo "Waiting for MariaDB... ($i/30)"
            sleep 5
            if [ "$i" -eq 30 ]; then
              echo "MariaDB did not become ready in time"
              docker compose logs db
              exit 1
            fi
          done

      - name: Run Docker Runner tests
        run: docker compose run --rm test-runner



      - name: Shutdown services
        run: docker compose down -v
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
